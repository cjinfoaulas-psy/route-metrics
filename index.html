<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RouteMetrics">
<meta name="description" content="Metrificação de tempo por trajeto com GPS">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='96' fill='%230f1117'/><text x='256' y='300' font-size='260' text-anchor='middle' fill='%234f8cff'>⏱</text></svg>">
<title>RouteMetrics</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; width: 100%; overflow-x: hidden; }
  body { background: #0f1117; font-family: 'Inter','SF Pro Display',system-ui,-apple-system,sans-serif; -webkit-font-smoothing: antialiased; }
  input { font-family: inherit; }
  button { font-family: inherit; -webkit-appearance: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @supports(padding: env(safe-area-inset-bottom)) {
    #root { padding-bottom: env(safe-area-inset-bottom); }
  }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line, Legend, CartesianGrid } = Recharts;

const C = {
  bg:"#0f1117", surface:"#1a1d27", surfaceHover:"#232736", border:"#2a2e3d",
  accent:"#4f8cff", accentSoft:"rgba(79,140,255,0.12)",
  green:"#34d399", greenSoft:"rgba(52,211,153,0.12)",
  red:"#f87171", redSoft:"rgba(248,113,113,0.12)",
  amber:"#fbbf24", amberSoft:"rgba(251,191,36,0.12)",
  text:"#e2e4eb", textMuted:"#8b8fa3", textDim:"#5c6078",
};
const RC = ["#4f8cff","#34d399","#fbbf24","#f87171","#a78bfa","#fb923c","#2dd4bf","#f472b6"];

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,toRad=d=>d*Math.PI/180,dLat=toRad(lat2-lat1),dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function totalDist(coords){
  if(!coords||coords.length<2)return 0;
  let d=0;for(let i=1;i<coords.length;i++) d+=haversine(coords[i-1].lat,coords[i-1].lng,coords[i].lat,coords[i].lng);
  return d;
}
function fmtTime(ms){
  if(!ms||ms<0)ms=0;const ts=Math.floor(ms/1000),h=Math.floor(ts/3600),m=Math.floor(ts%3600/60),s=ts%60;
  if(h>0)return`${h}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;
  return`${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;
}
function fmtDist(mt){if(!mt||mt<=0)return"0 m";if(mt<1000)return`${Math.round(mt)} m`;return`${(mt/1000).toFixed(2)} km`;}
function fmtSpeed(k){if(!k||k<=0)return"0 km/h";return`${k.toFixed(1)} km/h`;}

function groupByWeek(routes){
  const all=[];routes.forEach(r=>r.trips.forEach(t=>all.push({...t,routeName:r.name,routeColor:r.color})));
  if(!all.length)return{weeks:[],weeklyData:[],routeNames:[]};
  all.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const fd=new Date(all[0].timestamp),fm=new Date(fd);
  fm.setDate(fm.getDate()-((fm.getDay()+6)%7));fm.setHours(0,0,0,0);
  const wm={};
  all.forEach(trip=>{
    const td=new Date(trip.timestamp),dd=Math.floor((td-fm)/86400000),wn=Math.floor(dd/7)+1,key=`Sem ${wn}`;
    if(!wm[key])wm[key]={weekNum:wn,label:key,trips:[]};wm[key].trips.push(trip);
  });
  const weeks=Object.values(wm).sort((a,b)=>a.weekNum-b.weekNum);
  const rn=[...new Set(all.map(t=>t.routeName))];
  const wd=weeks.map(w=>{
    const p={week:w.label};
    rn.forEach(n=>{const rt=w.trips.filter(t=>t.routeName===n);
      if(rt.length>0){p[n]=+(rt.reduce((s,t)=>s+t.duration,0)/rt.length/60000).toFixed(2);p[`${n}_count`]=rt.length;}
    });return p;
  });
  return{weeks,weeklyData:wd,routeNames:rn};
}

function getStats(trips){
  if(!trips.length)return{avg:0,min:0,max:0,count:0,total:0,avgDist:0,avgSpeed:0};
  const t=trips.map(x=>x.duration),sum=t.reduce((a,b)=>a+b,0),ds=trips.map(x=>x.distance||0),td=ds.reduce((a,b)=>a+b,0);
  const sp=trips.filter(x=>x.distance>0&&x.duration>0).map(x=>(x.distance/1000)/(x.duration/3600000));
  return{avg:sum/t.length,min:Math.min(...t),max:Math.max(...t),count:t.length,total:sum,
    avgDist:ds.length?td/ds.length:0,avgSpeed:sp.length?sp.reduce((a,b)=>a+b,0)/sp.length:0};
}

function buildExportRows(routes){
  const rows=[];
  routes.forEach(route=>{route.trips.forEach((trip,i)=>{const d=new Date(trip.timestamp);
    rows.push({Rota:route.name,Viagem:i+1,Data:d.toLocaleDateString("pt-BR"),
      Horario:d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
      "Duracao (min)":+(trip.duration/60000).toFixed(2),"Duracao (seg)":Math.round(trip.duration/1000),
      "Distancia (km)":trip.distance?+(trip.distance/1000).toFixed(3):"",
      "Velocidade (km/h)":trip.speedKmh?+trip.speedKmh.toFixed(1):"",
      "Lat Inicio":trip.startCoord?trip.startCoord.lat.toFixed(6):"","Lng Inicio":trip.startCoord?trip.startCoord.lng.toFixed(6):"",
      "Lat Fim":trip.endCoord?trip.endCoord.lat.toFixed(6):"","Lng Fim":trip.endCoord?trip.endCoord.lng.toFixed(6):"",
      "Pontos GPS":trip.coords?.length||0,Nota:trip.note||""});
  })});return rows;
}
function buildSummaryRows(routes){
  return routes.filter(r=>r.trips.length>0).map(route=>{const s=getStats(route.trips);
    return{Rota:route.name,"Total Viagens":s.count,"Tempo Medio (min)":+(s.avg/60000).toFixed(2),
      "Tempo Min (min)":+(s.min/60000).toFixed(2),"Tempo Max (min)":+(s.max/60000).toFixed(2),
      "Dist Media (km)":s.avgDist?+(s.avgDist/1000).toFixed(3):"","Vel Media (km/h)":s.avgSpeed?+s.avgSpeed.toFixed(1):"",
      "Tempo Total (min)":+(s.total/60000).toFixed(2)};
  });
}
function dlFile(blob,fn){const u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}
function exportCSV(routes){
  const rows=buildExportRows(routes);if(!rows.length)return;const h=Object.keys(rows[0]);
  const csv=[h.join(";"),...rows.map(r=>h.map(k=>r[k]??"").join(";"))].join("\n");
  dlFile(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}),`RouteMetrics_Viagens_${new Date().toISOString().slice(0,10)}.csv`);
}
function exportExcel(routes){
  const tr=buildExportRows(routes),sr=buildSummaryRows(routes);if(!tr.length)return;
  const wb=XLSX.utils.book_new();
  const w1=XLSX.utils.json_to_sheet(tr);w1["!cols"]=Object.keys(tr[0]).map(k=>({wch:Math.max(k.length+2,14)}));
  const w2=XLSX.utils.json_to_sheet(sr);w2["!cols"]=Object.keys(sr[0]).map(k=>({wch:Math.max(k.length+2,16)}));
  XLSX.utils.book_append_sheet(wb,w1,"Viagens");XLSX.utils.book_append_sheet(wb,w2,"Resumo");
  const buf=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  dlFile(new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}),`RouteMetrics_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function loadData(){try{const d=localStorage.getItem("routemetrics");return d?JSON.parse(d):null;}catch{return null;}}
function saveData(routes){try{localStorage.setItem("routemetrics",JSON.stringify(routes));}catch(e){console.error(e);}}

function MiniMap({coords,color,size=80}){
  if(!coords||coords.length<2)return null;
  const lats=coords.map(c=>c.lat),lngs=coords.map(c=>c.lng);
  const mnLa=Math.min(...lats),mxLa=Math.max(...lats),mnLn=Math.min(...lngs),mxLn=Math.max(...lngs);
  const p=0.15,rL=(mxLa-mnLa)||0.001,rN=(mxLn-mnLn)||0.001;
  const pts=coords.map(c=>{const x=p*size+((c.lng-mnLn)/rN)*size*(1-2*p),y=p*size+((mxLa-c.lat)/rL)*size*(1-2*p);return`${x},${y}`;}).join(" ");
  const f=pts.split(" ")[0].split(","),l=pts.split(" ").slice(-1)[0].split(",");
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{borderRadius:8,background:C.bg,flexShrink:0}}>
    <polyline points={pts} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" opacity={0.85}/>
    <circle cx={f[0]} cy={f[1]} r={3} fill={C.green}/><circle cx={l[0]} cy={l[1]} r={3} fill={C.red}/>
  </svg>);
}

function StatCard({label,value,sub,color}){
  return(<div style={{background:C.surface,borderRadius:10,padding:"14px 16px",flex:1,minWidth:90}}>
    <div style={{fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{label}</div>
    <div style={{fontSize:18,fontWeight:700,color:color||C.text,fontVariantNumeric:"tabular-nums"}}>{value}</div>
    {sub&&<div style={{fontSize:10,color:C.textDim,marginTop:4}}>{sub}</div>}
  </div>);
}

function App(){
  const[routes,setRoutes]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[newRoute,setNewRoute]=useState("");
  const[activeRoute,setActiveRoute]=useState(null);
  const[isRunning,setIsRunning]=useState(false);
  const[startTime,setStartTime]=useState(null);
  const[elapsed,setElapsed]=useState(0);
  const[view,setView]=useState("tracker");
  const[editNote,setEditNote]=useState(null);
  const[noteText,setNoteText]=useState("");
  const[gpsStatus,setGpsStatus]=useState("idle");
  const[trackCoords,setTrackCoords]=useState([]);
  const[liveDist,setLiveDist]=useState(0);
  const[gpsAcc,setGpsAcc]=useState(null);
  const[expTrip,setExpTrip]=useState(null);
  const intRef=useRef(null),watchRef=useRef(null),coordsRef=useRef([]);

  useEffect(()=>{const d=loadData();if(d)setRoutes(d);setLoaded(true);},[]);
  useEffect(()=>{if(loaded)saveData(routes);},[routes,loaded]);
  useEffect(()=>{
    if(isRunning&&startTime){intRef.current=setInterval(()=>setElapsed(Date.now()-startTime),200);}
    return()=>clearInterval(intRef.current);
  },[isRunning,startTime]);

  const startGPS=useCallback(()=>{
    if(!navigator.geolocation){setGpsStatus("unavailable");return;}
    coordsRef.current=[];setTrackCoords([]);setLiveDist(0);setGpsStatus("tracking");
    watchRef.current=navigator.geolocation.watchPosition(
      pos=>{const pt={lat:pos.coords.latitude,lng:pos.coords.longitude,ts:Date.now(),acc:pos.coords.accuracy};
        setGpsAcc(Math.round(pos.coords.accuracy));if(pos.coords.accuracy>100)return;
        coordsRef.current.push(pt);setTrackCoords([...coordsRef.current]);setLiveDist(totalDist(coordsRef.current));},
      err=>{console.error(err);setGpsStatus("error");},
      {enableHighAccuracy:true,maximumAge:3000,timeout:10000});
  },[]);
  const stopGPS=useCallback(()=>{if(watchRef.current!==null){navigator.geolocation.clearWatch(watchRef.current);watchRef.current=null;}},[]);

  const addRoute=useCallback(()=>{
    const n=newRoute.trim();if(!n||routes.find(r=>r.name.toLowerCase()===n.toLowerCase()))return;
    setRoutes(p=>[...p,{id:Date.now().toString(),name:n,trips:[],color:RC[p.length%RC.length]}]);setNewRoute("");
  },[newRoute,routes]);

  const deleteRoute=id=>{if(activeRoute===id&&isRunning)return;setRoutes(p=>p.filter(r=>r.id!==id));if(activeRoute===id)setActiveRoute(null);};

  const startTimer=routeId=>{setActiveRoute(routeId);setIsRunning(true);setStartTime(Date.now());setElapsed(0);startGPS();};

  const stopTimer=()=>{
    if(!isRunning||!activeRoute)return;const dur=Date.now()-startTime,coords=[...coordsRef.current],dist=totalDist(coords);
    const spd=dist>0&&dur>0?(dist/1000)/(dur/3600000):0;
    setRoutes(p=>p.map(r=>r.id===activeRoute?{...r,trips:[...r.trips,{
      id:Date.now().toString(),duration:dur,distance:dist,speedKmh:spd,
      coords:coords.length>200?coords.filter((_,i)=>i%Math.ceil(coords.length/200)===0||i===coords.length-1):coords,
      timestamp:new Date().toISOString(),note:"",
      startCoord:coords[0]||null,endCoord:coords[coords.length-1]||null}]}:r));
    stopGPS();setIsRunning(false);setStartTime(null);setElapsed(0);setActiveRoute(null);setGpsStatus("idle");setTrackCoords([]);setLiveDist(0);setGpsAcc(null);
  };

  const deleteTrip=(rid,tid)=>setRoutes(p=>p.map(r=>r.id===rid?{...r,trips:r.trips.filter(t=>t.id!==tid)}:r));
  const saveNote=(rid,tid)=>{setRoutes(p=>p.map(r=>r.id===rid?{...r,trips:r.trips.map(t=>t.id===tid?{...t,note:noteText}:t)}:r));setEditNote(null);setNoteText("");};
  const clearAll=()=>{if(!confirm("Apagar todos os dados?"))return;setRoutes([]);localStorage.removeItem("routemetrics");};

  const arName=routes.find(r=>r.id===activeRoute)?.name;
  const arColor=routes.find(r=>r.id===activeRoute)?.color||C.accent;
  const hasTrips=routes.some(r=>r.trips.length>0);

  const avgData=routes.filter(r=>r.trips.length>0).map(r=>{const s=getStats(r.trips);
    return{name:r.name,media:+(s.avg/60000).toFixed(1),min:+(s.min/60000).toFixed(1),max:+(s.max/60000).toFixed(1),
      dist:+(s.avgDist/1000).toFixed(2),speed:+s.avgSpeed.toFixed(1),color:r.color};});
  const best=avgData.length?avgData.reduce((a,b)=>a.media<b.media?a:b):null;
  const maxT=Math.max(...routes.map(r=>r.trips.length),0);
  const tlData=[];for(let i=0;i<maxT;i++){const p={trip:`#${i+1}`};routes.forEach(r=>{if(r.trips[i])p[r.name]=+(r.trips[i].duration/60000).toFixed(2);});tlData.push(p);}
  const distData=routes.filter(r=>r.trips.length>0&&r.trips.some(t=>t.distance>0)).map(r=>{const s=getStats(r.trips);
    return{name:r.name,distancia:+(s.avgDist/1000).toFixed(2),velocidade:+s.avgSpeed.toFixed(1),color:r.color};});
  const wg=groupByWeek(routes);

  const gpsInd=()=>{
    if(gpsStatus==="tracking")return{text:`GPS ativo (${gpsAcc||"..."}m)`,color:C.green};
    if(gpsStatus==="error")return{text:"GPS sem permissão",color:C.red};
    if(gpsStatus==="unavailable")return{text:"GPS indisponível",color:C.red};return null;};

  const btn=a=>({padding:"8px 14px",borderRadius:8,border:"none",background:a?C.accent:"transparent",
    color:a?"#fff":C.textMuted,fontWeight:600,fontSize:13,cursor:"pointer",flex:1,textAlign:"center"});

  const ttStyle={background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12};

  if(!loaded)return(<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textMuted}}>Carregando...</div>);

  return(
  <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Inter','SF Pro Display',system-ui,sans-serif"}}>
    <div style={{padding:"24px 20px 0",maxWidth:600,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${C.accent},${C.green})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⏱</div>
          <div><h1 style={{margin:0,fontSize:20,fontWeight:700,letterSpacing:-0.5}}>RouteMetrics</h1>
          <p style={{margin:0,fontSize:11,color:C.textDim}}>v2 PWA — GPS + distância + velocidade</p></div>
        </div>
        {routes.length>0&&<button onClick={clearAll} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.textDim,fontSize:11,cursor:"pointer"}}>Resetar</button>}
      </div>
      <div style={{display:"flex",gap:4,marginTop:16,marginBottom:20,background:C.surface,borderRadius:10,padding:4}}>
        {[["tracker","Cronômetro"],["history","Histórico"],["analysis","Análise"]].map(([k,l])=>(
          <button key={k} onClick={()=>setView(k)} style={btn(view===k)}>{l}</button>))}
      </div>
    </div>

    <div style={{maxWidth:600,margin:"0 auto",padding:"0 20px 40px"}}>

    {/* TRACKER */}
    {view==="tracker"&&<>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <input value={newRoute} onChange={e=>setNewRoute(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addRoute()}
          placeholder="Nome da rota (ex: Caminho A)" style={{flex:1,padding:"10px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,color:C.text,fontSize:14,outline:"none"}}/>
        <button onClick={addRoute} disabled={!newRoute.trim()} style={{padding:"10px 16px",borderRadius:8,border:"none",background:newRoute.trim()?C.accent:C.border,color:"#fff",fontWeight:600,fontSize:14,cursor:newRoute.trim()?"pointer":"default",opacity:newRoute.trim()?1:0.4}}>+ Rota</button>
      </div>

      {isRunning&&<div style={{background:C.accentSoft,border:`1px solid ${C.accent}`,borderRadius:14,padding:24,textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:11,color:C.accent,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4}}>Em trajeto</div>
        <div style={{fontSize:14,color:C.textMuted,marginBottom:10}}>{arName}</div>
        <div style={{fontSize:48,fontWeight:800,fontVariantNumeric:"tabular-nums",color:C.text,letterSpacing:-1}}>{fmtTime(elapsed)}</div>
        <div style={{display:"flex",justifyContent:"center",gap:20,marginTop:14,fontSize:13}}>
          <div><span style={{color:C.textDim}}>Distância: </span><strong style={{color:C.text}}>{fmtDist(liveDist)}</strong></div>
          {liveDist>0&&elapsed>0&&<div><span style={{color:C.textDim}}>Vel. média: </span><strong style={{color:C.text}}>{fmtSpeed((liveDist/1000)/(elapsed/3600000))}</strong></div>}
        </div>
        {gpsInd()&&<div style={{marginTop:10,fontSize:11,color:gpsInd().color,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:gpsInd().color,display:"inline-block",animation:gpsStatus==="tracking"?"pulse 1.5s infinite":"none"}}/>{gpsInd().text}
          {trackCoords.length>0&&<span style={{color:C.textDim}}> ({trackCoords.length} pts)</span>}
        </div>}
        {trackCoords.length>=2&&<div style={{display:"flex",justifyContent:"center",marginTop:14}}><MiniMap coords={trackCoords} color={arColor} size={120}/></div>}
        <button onClick={stopTimer} style={{marginTop:18,padding:"14px 40px",borderRadius:12,border:"none",background:C.green,color:"#0f1117",fontWeight:700,fontSize:16,cursor:"pointer",letterSpacing:0.5}}>Cheguei!</button>
      </div>}

      {routes.length===0&&!isRunning&&<div style={{textAlign:"center",padding:40,color:C.textDim}}>
        <div style={{fontSize:32,marginBottom:12}}>📍</div><div style={{fontSize:14}}>Crie sua primeira rota para começar</div>
        <div style={{fontSize:12,marginTop:6,color:C.textDim}}>O GPS será ativado automaticamente ao iniciar</div>
      </div>}

      {routes.map(route=>{const st=getStats(route.trips),isA=activeRoute===route.id&&isRunning;
        return(<div key={route.id} style={{background:C.surface,borderRadius:12,padding:16,marginBottom:10,border:isA?`1px solid ${C.accent}`:`1px solid ${C.border}`,opacity:isRunning&&!isA?0.35:1,transition:"all 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:route.color}}/>
              <span style={{fontWeight:600,fontSize:15}}>{route.name}</span>
              <span style={{fontSize:12,color:C.textDim}}>{st.count} viagem{st.count!==1?"ns":""}</span>
            </div>
            <div style={{display:"flex",gap:6}}>
              {!isRunning&&<><button onClick={()=>startTimer(route.id)} style={{padding:"7px 16px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer"}}>Iniciar</button>
              <button onClick={()=>deleteRoute(route.id)} style={{padding:"7px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.textDim,fontSize:13,cursor:"pointer"}}>✕</button></>}
            </div>
          </div>
          {st.count>0&&<div style={{display:"flex",gap:12,marginTop:10,fontSize:11,color:C.textMuted,flexWrap:"wrap"}}>
            <span>Média: <strong style={{color:C.text}}>{fmtTime(st.avg)}</strong></span>
            <span>Min: <strong style={{color:C.green}}>{fmtTime(st.min)}</strong></span>
            <span>Max: <strong style={{color:C.red}}>{fmtTime(st.max)}</strong></span>
            {st.avgDist>0&&<span>Dist: <strong style={{color:C.amber}}>{fmtDist(st.avgDist)}</strong></span>}
            {st.avgSpeed>0&&<span>Vel: <strong style={{color:C.accent}}>{fmtSpeed(st.avgSpeed)}</strong></span>}
          </div>}
        </div>);
      })}
    </>}

    {/* HISTORY */}
    {view==="history"&&<>
      {hasTrips&&<div style={{display:"flex",gap:8,marginBottom:20,background:C.surface,borderRadius:12,padding:14,alignItems:"center",justifyContent:"space-between",border:`1px solid ${C.border}`}}>
        <span style={{fontSize:13,color:C.textMuted}}>Exportar dados</span>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>exportCSV(routes)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:C.green,color:"#0f1117",fontWeight:600,fontSize:13,cursor:"pointer"}}>CSV</button>
          <button onClick={()=>exportExcel(routes)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer"}}>Excel</button>
        </div>
      </div>}
      {!hasTrips&&<div style={{textAlign:"center",padding:40,color:C.textDim,fontSize:14}}>Nenhuma viagem registrada</div>}
      {routes.filter(r=>r.trips.length>0).map(route=>(
        <div key={route.id} style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:route.color}}/><h3 style={{margin:0,fontSize:16,fontWeight:600}}>{route.name}</h3>
            <span style={{fontSize:12,color:C.textDim}}>{route.trips.length} viagem{route.trips.length!==1?"ns":""}</span>
          </div>
          {[...route.trips].reverse().map(trip=>{const d=new Date(trip.timestamp),ds=d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"}),ts=d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),isE=expTrip===trip.id;
            return(<div key={trip.id} style={{background:C.surface,borderRadius:10,padding:"12px 14px",marginBottom:6,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setExpTrip(isE?null:trip.id)}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:12}}>
                    <span style={{fontWeight:600,fontSize:15,fontVariantNumeric:"tabular-nums"}}>{fmtTime(trip.duration)}</span>
                    {trip.distance>0&&<span style={{fontSize:12,color:C.amber}}>{fmtDist(trip.distance)}</span>}
                    {trip.speedKmh>0&&<span style={{fontSize:12,color:C.accent}}>{fmtSpeed(trip.speedKmh)}</span>}
                  </div>
                  <div style={{fontSize:11,color:C.textDim,marginTop:3}}>{ds} {ts}{trip.note&&<span style={{color:C.textMuted}}> — {trip.note}</span>}</div>
                </div>
                {trip.coords&&trip.coords.length>=2&&<MiniMap coords={trip.coords} color={route.color} size={50}/>}
              </div>
              {isE&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
                {trip.coords&&trip.coords.length>=2&&<div style={{display:"flex",justifyContent:"center",marginBottom:12}}><MiniMap coords={trip.coords} color={route.color} size={200}/></div>}
                <div style={{display:"flex",gap:6,flexWrap:"wrap",fontSize:11,color:C.textDim,marginBottom:10}}>
                  <span>GPS: {trip.coords?.length||0} pts</span>
                  {trip.startCoord&&<span>De: {trip.startCoord.lat.toFixed(5)},{trip.startCoord.lng.toFixed(5)}</span>}
                  {trip.endCoord&&<span>Até: {trip.endCoord.lat.toFixed(5)},{trip.endCoord.lng.toFixed(5)}</span>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  {editNote===trip.id?<>
                    <input value={noteText} onChange={e=>setNoteText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveNote(route.id,trip.id)}
                      placeholder="Ex: trânsito, chuva..." style={{flex:1,padding:"5px 8px",borderRadius:6,border:`1px solid ${C.border}`,background:C.bg,color:C.text,fontSize:12,outline:"none"}} autoFocus/>
                    <button onClick={()=>saveNote(route.id,trip.id)} style={{padding:"5px 10px",borderRadius:6,border:"none",background:C.accent,color:"#fff",fontSize:11,cursor:"pointer"}}>Salvar</button>
                  </>:<>
                    <button onClick={()=>{setEditNote(trip.id);setNoteText(trip.note||"");}} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.textDim,fontSize:11,cursor:"pointer"}}>{trip.note?"Editar nota":"+ Nota"}</button>
                    <button onClick={()=>deleteTrip(route.id,trip.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.red,fontSize:11,cursor:"pointer"}}>Excluir</button>
                  </>}
                </div>
              </div>}
            </div>);})}
        </div>))}
    </>}

    {/* ANALYSIS */}
    {view==="analysis"&&<>
      {!hasTrips?<div style={{textAlign:"center",padding:40,color:C.textDim,fontSize:14}}>Registre viagens para ver a análise</div>
      :<>
        {best&&avgData.length>=2&&<div style={{background:C.greenSoft,border:`1px solid ${C.green}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:11,color:C.green,textTransform:"uppercase",letterSpacing:1.5}}>Rota mais rápida</div>
          <div style={{fontSize:28,fontWeight:800,marginTop:6}}>{best.name}</div>
          <div style={{fontSize:13,color:C.textMuted,marginTop:4}}>Média de {best.media} min
            {(()=>{const o=avgData.filter(r=>r.name!==best.name),w=o.reduce((a,b)=>a.media>b.media?a:b),d=(w.media-best.media).toFixed(1);
              return d>0?` (${d} min mais rápida que ${w.name})`:"";})()}
          </div>
          {best.dist>0&&<div style={{fontSize:12,color:C.textDim,marginTop:4}}>Dist: {best.dist} km | Vel: {best.speed} km/h</div>}
        </div>}

        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          <StatCard label="Rotas" value={routes.length}/><StatCard label="Viagens" value={routes.reduce((a,r)=>a+r.trips.length,0)}/>
          <StatCard label="Tempo total" value={fmtTime(routes.reduce((a,r)=>a+getStats(r.trips).total,0))}/>
        </div>

        <div style={{background:C.surface,borderRadius:14,padding:"18px 14px",marginBottom:20}}>
          <h3 style={{margin:"0 0 16px 4px",fontSize:14,fontWeight:600}}>Tempo Médio por Rota (min)</h3>
          <ResponsiveContainer width="100%" height={200}><BarChart data={avgData} barSize={30}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="name" tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false} unit=" min"/>
            <Tooltip contentStyle={ttStyle} formatter={v=>[`${v} min`]}/><Bar dataKey="media" name="Média" fill={C.accent} radius={[6,6,0,0]}/>
            <Bar dataKey="min" name="Min" fill={C.green} radius={[6,6,0,0]}/><Bar dataKey="max" name="Max" fill={C.red} radius={[6,6,0,0]}/>
            <Legend wrapperStyle={{fontSize:11,color:C.textMuted}}/>
          </BarChart></ResponsiveContainer>
        </div>

        {distData.length>0&&<div style={{background:C.surface,borderRadius:14,padding:"18px 14px",marginBottom:20}}>
          <h3 style={{margin:"0 0 16px 4px",fontSize:14,fontWeight:600}}>Distância e Velocidade Média</h3>
          <ResponsiveContainer width="100%" height={200}><BarChart data={distData} barSize={30}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="name" tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false}/>
            <YAxis yAxisId="left" tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false} unit=" km"/>
            <YAxis yAxisId="right" orientation="right" tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false} unit=" km/h"/>
            <Tooltip contentStyle={ttStyle}/><Bar yAxisId="left" dataKey="distancia" name="Dist (km)" fill={C.amber} radius={[6,6,0,0]}/>
            <Bar yAxisId="right" dataKey="velocidade" name="Vel (km/h)" fill={C.accent} radius={[6,6,0,0]}/>
            <Legend wrapperStyle={{fontSize:11,color:C.textMuted}}/>
          </BarChart></ResponsiveContainer>
        </div>}

        {tlData.length>=2&&<div style={{background:C.surface,borderRadius:14,padding:"18px 14px",marginBottom:20}}>
          <h3 style={{margin:"0 0 16px 4px",fontSize:14,fontWeight:600}}>Evolução por Viagem (min)</h3>
          <ResponsiveContainer width="100%" height={220}><LineChart data={tlData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="trip" tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false} unit=" min"/>
            <Tooltip contentStyle={ttStyle} formatter={v=>[`${v} min`]}/>
            {routes.filter(r=>r.trips.length>0).map(r=>(<Line key={r.id} type="monotone" dataKey={r.name} stroke={r.color} strokeWidth={2} dot={{r:4}}/>))}
            <Legend wrapperStyle={{fontSize:11}}/>
          </LineChart></ResponsiveContainer>
        </div>}

        {/* WEEKLY */}
        {wg.weeks.length>=1&&<>
          <div style={{marginBottom:12}}><h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700}}>Comparativo Semanal</h3>
            <p style={{margin:0,fontSize:12,color:C.textDim}}>Desempenho por semana e rota</p></div>

          {wg.weeklyData.length>=1&&<div style={{background:C.surface,borderRadius:14,padding:"18px 14px",marginBottom:16}}>
            <h3 style={{margin:"0 0 16px 4px",fontSize:14,fontWeight:600}}>Média Semanal por Rota (min)</h3>
            <ResponsiveContainer width="100%" height={220}><BarChart data={wg.weeklyData} barSize={24}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="week" tick={{fill:C.textMuted,fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false} unit=" min"/>
              <Tooltip contentStyle={ttStyle} formatter={(v,n)=>[`${v} min`,n]}/>
              {routes.filter(r=>r.trips.length>0).map(r=>(<Bar key={r.id} dataKey={r.name} name={r.name} fill={r.color} radius={[6,6,0,0]}/>))}
              <Legend wrapperStyle={{fontSize:11}}/>
            </BarChart></ResponsiveContainer>
          </div>}

          {wg.weeklyData.length>=2&&<div style={{background:C.surface,borderRadius:14,padding:"18px 14px",marginBottom:16}}>
            <h3 style={{margin:"0 0 16px 4px",fontSize:14,fontWeight:600}}>Tendência Semanal (min)</h3>
            <ResponsiveContainer width="100%" height={200}><LineChart data={wg.weeklyData}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="week" tick={{fill:C.textMuted,fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:C.textMuted,fontSize:12}} axisLine={false} tickLine={false} unit=" min"/>
              <Tooltip contentStyle={ttStyle} formatter={v=>[`${v} min`]}/>
              {routes.filter(r=>r.trips.length>0).map(r=>(<Line key={r.id} type="monotone" dataKey={r.name} stroke={r.color} strokeWidth={2.5} dot={{r:5}} connectNulls={false}/>))}
              <Legend wrapperStyle={{fontSize:11}}/>
            </LineChart></ResponsiveContainer>
          </div>}

          {wg.weeks.map(w=>{const riw={};w.trips.forEach(t=>{if(!riw[t.routeName])riw[t.routeName]={trips:[],color:t.routeColor};riw[t.routeName].trips.push(t);});
            const tt=w.trips.length,ttm=w.trips.reduce((s,t)=>s+t.duration,0);
            return(<div key={w.label} style={{background:C.surface,borderRadius:12,padding:16,marginBottom:10,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div><div style={{fontWeight:700,fontSize:15}}>{w.label}</div>
                <div style={{fontSize:11,color:C.textDim}}>{tt} viagem{tt!==1?"ns":""} | Total: {fmtTime(ttm)}</div></div>
              </div>
              {Object.entries(riw).map(([rn,rd])=>{const av=rd.trips.reduce((s,t)=>s+t.duration,0)/rd.trips.length,mn=Math.min(...rd.trips.map(t=>t.duration)),mx=Math.max(...rd.trips.map(t=>t.duration));
                const dts=rd.trips.filter(t=>t.distance>0),ad=dts.length?dts.reduce((s,t)=>s+t.distance,0)/dts.length:0;
                return(<div key={rn} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderTop:`1px solid ${C.border}`}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:rd.color,flexShrink:0}}/>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{rn} <span style={{fontWeight:400,color:C.textDim,fontSize:11}}>({rd.trips.length}x)</span></div>
                    <div style={{display:"flex",gap:10,fontSize:11,color:C.textMuted,marginTop:3,flexWrap:"wrap"}}>
                      <span>Média: <strong style={{color:C.text}}>{fmtTime(av)}</strong></span>
                      <span>Min: <strong style={{color:C.green}}>{fmtTime(mn)}</strong></span>
                      <span>Max: <strong style={{color:C.red}}>{fmtTime(mx)}</strong></span>
                      {ad>0&&<span>Dist: <strong style={{color:C.amber}}>{fmtDist(ad)}</strong></span>}
                    </div></div>
                </div>);})}
            </div>);
          })}
        </>}
      </>}
    </>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW:',e));}
</script>
</body>
</html>
